<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon — newsletter</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
          <tr>
            <td style="background:linear-gradient(135deg,#ffeaea 0%,#fff5f8 100%);padding:24px;text-align:center;border-bottom:1px solid rgba(195,35,83,0.12);">
              <p style="margin:0 0 6px;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#c32353;">La Solution</p>
              <h1 style="margin:0;font-size:20px;line-height:1.3;color:#111827;font-weight:700;">Inscription newsletter</h1>
              <p style="margin:10px 0 0;font-size:14px;color:#6b7280;">Page Coming Soon — notification au lancement</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 24px 32px;text-align:center;">
              <p style="margin:0 0 12px;font-size:14px;color:#4b5563;">Nouvelle adresse à notifier :</p>
              <p style="margin:0;font-size:18px;font-weight:600;">
                <a href="mailto:{{email}}" style="color:#c32353;text-decoration:none;">{{email}}</a>
              </p>
              <p style="margin:24px 0 0;font-size:13px;line-height:1.5;color:#6b7280;">
                Répondez depuis votre messagerie pour contacter cette personne si besoin.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
