<svg xmlns="http://www.w3.org/2000/svg" width="640" height="820" viewBox="0 0 640 820" role="img" aria-labelledby="authIllustrationTitle">
  <title id="authIllustrationTitle">Illustration d'un smartphone confirmant une commande</title>
  <defs>
    <linearGradient id="bgGradient" x1="4%" y1="0%" x2="96%" y2="100%">
      <stop offset="0%" stop-color="#ffe4ec" />
      <stop offset="50%" stop-color="#f5d9ff" />
      <stop offset="100%" stop-color="#dcf1ff" />
    </linearGradient>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce5ee" />
      <stop offset="100%" stop-color="#f06f85" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  <rect width="640" height="820" rx="48" fill="url(#bgGradient)" />
  <g transform="translate(170 80)">
    <rect x="0" y="0" width="300" height="620" rx="56" fill="#0f172a" opacity="0.12" />
    <rect x="18" y="12" width="264" height="596" rx="48" fill="#0f172a" opacity="0.18" />
    <rect x="26" y="24" width="248" height="572" rx="42" fill="#181d2f" />
    <rect x="38" y="76" width="224" height="428" rx="30" fill="url(#deviceGradient)" />
    <rect x="38" y="530" width="224" height="52" rx="26" fill="#f7f7fb" />
    <rect x="133" y="42" width="32" height="10" rx="5" fill="#2b3148" />
    <rect x="128" y="560" width="42" height="6" rx="3" fill="#d6d9e6" />
  </g>
  <g transform="translate(146 250)">
    <rect x="0" y="0" width="348" height="170" rx="32" fill="url(#cardGradient)" />
    <rect x="0" y="0" width="348" height="170" rx="32" fill="#ffffff" opacity="0.45" />
    <text x="32" y="52" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#e43d4b">La Solution</text>
    <text x="32" y="92" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#6f7787">Votre commande est confirmťe.</text>
    <text x="32" y="130" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#9aa0af">Pour lancer la livraison, cliquez simplement sur valider.</text>
    <rect x="220" y="118" width="96" height="26" rx="13" fill="#e43d4b" />
    <text x="244" y="136" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Validez</text>
  </g>
</svg>
